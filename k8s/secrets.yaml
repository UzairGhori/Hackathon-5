  POSTGRES_PASSWORD: cG9zdGdyZXM=

  # echo -n 'your-xai-key' | base64 → eW91ci14YWkta2V5
  XAI_API_KEY: eW91ci14YWkta2V5

  # Full DATABASE_URL with password baked in (used by app containers)
  # echo -n 'postgresql+psycopg://postgres:postgres@postgres.customer-success.svc.cluster.local:5432/customer_success' | base64
  DATABASE_URL: cG9zdGdyZXNxbCtwc3ljb3BnOi8vcG9zdGdyZXM6cG9zdGdyZXNAcG9zdGdyZXMuY3VzdG9tZXItc3VjY2Vzcy5zdmMuY2x1c3Rlci5sb2NhbDo1NDMyL2N1c3RvbWVyX3N1Y2Nlc3M
