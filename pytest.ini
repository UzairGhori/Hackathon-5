[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
addopts = -ra -q --tb=short
markers =
    xfail_gap: Test documents a known production-code gap; flip to passing when the gap is closed.
