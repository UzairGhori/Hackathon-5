services:
  # --- Backend API Service ---
  - type: web
    name: customer-success-api
    env: docker
    dockerfilePath: docker/api.Dockerfile
    plan: free # Change to starter or higher for production
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: customer-success-db
          property: connectionString
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: # You will need a managed Kafka like Confluent or Upstash
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: XAI_MODEL
        value: grok-4.20-reasoning
      - key: GMAIL_EMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

  # --- Kafka Worker Service ---
  - type: worker
    name: customer-success-worker
    env: docker
    dockerfilePath: docker/worker.Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: customer-success-db
          property: connectionString
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: # Use the same Kafka URL as above
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: XAI_MODEL
        value: grok-4.20-reasoning

databases:
  - name: customer-success-db
    plan: free # Render's free DB expires after 90 days. Use Neon.tech for permanent free tier.
    databaseName: customer_success
    user: postgres
